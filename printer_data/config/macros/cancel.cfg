[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: BASE_CANCEL_PRINT
gcode:
    TURN_OFF_HEATERS
    CLEAR_PAUSE
    SDCARD_RESET_FILE
    G91
    G1 Z10 F900       # Lift nozzle 10mm safely
    G90
    G1 X10 Y200 F3000   # Present the print bed
    M84               # Turn off stepper motors
    BASE_CANCEL_PRINT
